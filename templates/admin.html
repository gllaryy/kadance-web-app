<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Адмін — KAdance</title>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../static/css/admin.css" />
</head>
<body>
 
<header>
  <h1>KAdance - Панель адміна</h1>
  <span id="last-update">Завантаження...</span>
</header>
 
<main>
  <div class="stats">
    <div class="stat-card">
      <div class="number" id="total-registrations">—</div>
      <div class="label">Всього записів</div>
    </div>
    <div class="stat-card">
      <div class="number" id="total-clients">—</div>
      <div class="label">Унікальних клієнтів</div>
    </div>
    <div class="stat-card">
      <div class="number" id="total-classes">—</div>
      <div class="label">Популярне заняття</div>
    </div>
  </div>
 

  <div class="filters">
    <input type="text" id="search" placeholder="Пошук по імені..." oninput="filterTable()" />
    <select id="filter-day" onchange="filterTable()">
      <option value="">Всі дні</option>
      <option>Понеділок</option>
      <option>Вівторок</option>
      <option>Середа</option>
      <option>Четвер</option>
      <option>П'ятниця</option>
      <option>Субота</option>
      <option>Неділя</option>
    </select>
    <button class="refresh-btn" onclick="loadData()"> Оновити</button>
  </div>
 

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Клієнт</th>
          <th>Телефон</th>
          <th>Заняття</th>
          <th>День</th>
          <th>Час</th>
          <th>Тренер</th>
          <th>Дата запису</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="8" class="loading">Завантаження даних...</td></tr>
      </tbody>
    </table>
  </div>
</main>
 
<script>
  let allData = [];
 
  async function loadData() {
    try {
      const res = await fetch('https://localhost:7098/api/registration');
      allData = await res.json();
 
      updateStats();
      renderTable(allData);
 
      const now = new Date().toLocaleTimeString('uk-UA');
      document.getElementById('last-update').textContent = 'Оновлено о ' + now;
    } catch (e) {
      document.getElementById('table-body').innerHTML =
        '<tr><td colspan="7" class="empty">Не вдалося підключитись до сервера. Переконайся що API запущене.</td></tr>';
    }
  }
 
  function updateStats() {
    document.getElementById('total-registrations').textContent = allData.length;
 
    const uniqueClients = new Set(allData.map(r => r.clientName)).size;
    document.getElementById('total-clients').textContent = uniqueClients;
 
   
    const classCounts = {};
    allData.forEach(r => {
      classCounts[r.class] = (classCounts[r.class] || 0) + 1;
    });
    const popular = Object.entries(classCounts).sort((a, b) => b[1] - a[1])[0];
    document.getElementById('total-classes').textContent = popular ? popular[0] : '—';
  }
 
  function renderTable(data) {
    const tbody = document.getElementById('table-body');
 
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">Записів ще немає</td></tr>';
      return;
    }
 
    tbody.innerHTML = data.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${r.clientName}</strong></td>
        <td>${r.phone ?? r.Phone ?? '—'}</td>
        <td>${r.class}</td>
        <td><span class="badge">${r.day}</span></td>
        <td>${r.time}</td>
        <td>${r.trainer}</td>
        <td>${new Date(r.createdAt).toLocaleDateString('uk-UA')}</td>
      </tr>
    `).join('');
  }
 
  function filterTable() {
    const search = document.getElementById('search').value.toLowerCase();
    const day = document.getElementById('filter-day').value;
 
    const filtered = allData.filter(r => {
      const matchName = r.clientName.toLowerCase().includes(search);
      const matchDay = day === '' || r.day === day;
      return matchName && matchDay;
    });
 
    renderTable(filtered);
  }
 
  loadData();
</script>
 
</body>
</html>
